name: OnePlusOSS Kernel Monitor
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      ORG: "OnePlusOSS"
      BLACKLIST: "" 
      STATE_FILE: "old_state.json"
      GH_TOKEN: ${{ github.token }}
      GH_HTTP_TIMEOUT: 600

    steps:
      - name: Restore Previous State
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.STATE_FILE }}
          key: state-${{ github.run_id }}
          restore-keys: |
            state-master-

      - name: Process Repositories
        run: |
          # 1. Initialize State
          if [ ! -f "$STATE_FILE" ]; then echo "{}" > "$STATE_FILE"; fi
          echo "{}" > new_state.json
          
          # 2. Get All Repos
          REPOS=$(gh repo list $ORG --limit 1000 --json name --jq '.[] | select(.name | startswith("android_kernel_") and (contains("modules") | not)) | .name')
          
          echo "## 🚀 OnePlusOSS Update Summary" >> $GITHUB_STEP_SUMMARY
          
          # 3. Check for New Repos
          echo "🆕 Checking for new repositories..."
          NEW_REPOS_FOUND=""
          for repo in $REPOS; do
            if ! jq -e ".\"$repo\"" "$STATE_FILE" > /dev/null; then
               echo "  ✨ New repo detected: $repo"
               NEW_REPOS_FOUND+="$repo "
            fi
          done
          
          if [ ! -z "$NEW_REPOS_FOUND" ]; then
            echo "### ✨ New Repositories Added" >> $GITHUB_STEP_SUMMARY
            for r in $NEW_REPOS_FOUND; do echo "* $r" >> $GITHUB_STEP_SUMMARY; done
          fi

          # 4. Deep Scan with Retry Logic
          echo "### 📊 Branch Status & Kernel Versions" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | Branch | Latest Commit | Kernel | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY

          for repo in $REPOS; do
            if [[ "$BLACKLIST" =~ "$repo" ]]; then continue; fi

            echo "📂 Processing: $repo"

            QUERY='query($name: String!, $owner: String!) {
              repository(name: $name, owner: $owner) {
                refs(refPrefix: "refs/heads/", first: 50) {
                  nodes {
                    name
                    target {
                      ... on Commit {
                        oid
                        message
                        file(path: "Makefile") {
                          ... on TreeEntry {
                            object {
                              ... on Blob {
                                text
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }'

            # --- RETRY BLOCK START ---
            MAX_RETRIES=5
            RETRY_COUNT=0
            BRANCH_DATA=""

            until [ $RETRY_COUNT -ge $MAX_RETRIES ]
            do
              BRANCH_DATA=$(gh api graphql -f query="$QUERY" -f owner="$ORG" -f name="$repo" --jq '.data.repository.refs.nodes[]' 2>/dev/null || echo "")
              
              if [ ! -z "$BRANCH_DATA" ]; then
                break
              fi
              
              RETRY_COUNT=$((RETRY_COUNT+1))
              echo "  ⚠️ API failed for $repo. Retry $RETRY_COUNT/$MAX_RETRIES in 2s..."
              sleep 2
            done
            # --- RETRY BLOCK END ---

            if [ -z "$BRANCH_DATA" ]; then
              echo "  ❌ Failed to fetch $repo after $MAX_RETRIES attempts. Skipping."
              continue
            fi

            while read -r row; do
              [ -z "$row" ] && continue
              
              BRANCH_NAME=$(echo "$row" | jq -r '.name')
              SHA=$(echo "$row" | jq -r '.target.oid')
              MSG=$(echo "$row" | jq -r '.target.message' | head -n 1 | cut -c1-50 | sed 's/|/ /g')
              MAKEFILE_TEXT=$(echo "$row" | jq -r '.target.file.object.text // empty')

              echo "  ↳ 🌿 Branch: $BRANCH_NAME"

              if [ ! -z "$MAKEFILE_TEXT" ]; then
                KERNEL=$(echo "$MAKEFILE_TEXT" | grep -E "^(VERSION|PATCHLEVEL|SUBLEVEL) =" | cut -d'=' -f2 | tr -d ' ' | paste -sd '.' -)
              else
                KERNEL="N/A"
              fi
              echo "    🐧 Kernel: $KERNEL"

              OLD_VAL=$(jq -r ".\"$repo\".\"$BRANCH_NAME\" // \"NONE\"" "$STATE_FILE")
              CURRENT_VAL="$SHA|$KERNEL"
              
              STATUS="✅"
              if [ "$OLD_VAL" == "NONE" ]; then 
                STATUS="🆕"
                echo "    ⭐ New branch found!"
              elif [ "$OLD_VAL" != "$CURRENT_VAL" ]; then 
                STATUS="🔄 Updated"
                echo "    🔼 Change detected!"
              fi

              echo "| $repo | $BRANCH_NAME | $MSG | $KERNEL | $STATUS |" >> $GITHUB_STEP_SUMMARY
              jq ".\"$repo\".\"$BRANCH_NAME\" = \"$CURRENT_VAL\"" new_state.json > tmp.json && mv tmp.json new_state.json

            done <<< "$BRANCH_DATA"
          done
          
          mv new_state.json "$STATE_FILE"

      - name: Save Updated State
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.STATE_FILE }}
          key: state-master-${{ github.run_id }}