name: 🚀 Build và Release OKI Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: '📦 Bạn có muốn tạo Release không?'
        required: true
        type: boolean
        default: false
      op_model:
        description: '📱 Chọn model OnePlus để build'
        required: true
        type: choice
        options:
          - OOS14+15+16
          - OOS15+16
          - OOS14+15
          - OOS16
          - OOS15
          - OOS14
          - android16-6.12
          - android15-6.6
          - android14-6.1
          - android13-5.15
          - android12-5.10
        default: OOS16
      ksu_options:
        description: '🧬 Nhập chuỗi JSON cấu hình KernelSU'
        required: true
        type: string
        default: '[{"type":"ksun","hash":"dev"}]'
      optimize_level:
        description: "⚡ Mức độ tối ưu hóa trình biên dịch"
        required: true
        type: choice
        options: [O2, O3]
        default: O2
      clean_build:
        description: '🧹 Build sạch (Không sử dụng ccache)'
        type: boolean
        default: false
      debug:
        description: '🐛 Bật trích xuất các tệp gỡ lỗi (debug artifacts)'
        required: false
        type: boolean
        default: false
      mirror_toolchains:
        description: '🔄 Bạn có muốn đồng bộ toolchains trước khi build? [99% không cần thiết]'
        required: false
        type: boolean
        default: false
      build_timestamp:
        description: '🕒 Tùy chỉnh thời gian build cho uname -a (VD: "Tue Feb 10 10:01:02 UTC 2026"). Để trống dùng giờ hiện tại.'
        type: string
        default: ''
      android12-5_10_susfs_branch_or_commit:
        description: '🌿 Nhập Nhánh hoặc mã commit SusFS cho android12-5.10'
        type: string
        default: ''
      android13-5_15_susfs_branch_or_commit:
        description: '🌿 Nhập Nhánh hoặc mã commit SusFS cho android13-5.15'
        type: string
        default: ''
      android14-6_1_susfs_branch_or_commit:
        description: '🌿 Nhập Nhánh hoặc mã commit SusFS cho android14-6.1'
        type: string
        default: ''
      android15-6_6_susfs_branch_or_commit:
        description: '🌿 Nhập Nhánh hoặc mã commit SusFS cho android15-6.6'
        type: string
        default: ''
      android16-6_12_susfs_branch_or_commit:
        description: '🌿 Nhập Nhánh hoặc mã commit SusFS cho android16-6.12'
        type: string
        default: ''

jobs:
  set-op-model:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      device_count: ${{ steps.set-matrix.outputs.count }}
      active_gki_keys: ${{ steps.set-matrix.outputs.active_gki_keys }}
      susfs_hash_android12_5_10: ${{ steps.set-matrix.outputs.susfs_hash_android12_5_10 }}
      susfs_hash_android13_5_15: ${{ steps.set-matrix.outputs.susfs_hash_android13_5_15 }}
      susfs_hash_android14_6_1:  ${{ steps.set-matrix.outputs.susfs_hash_android14_6_1 }}
      susfs_hash_android15_6_6:  ${{ steps.set-matrix.outputs.susfs_hash_android15_6_6 }}
      susfs_hash_android16_6_12: ${{ steps.set-matrix.outputs.susfs_hash_android16_6_12 }}
      ksu_resolved_hash:    ${{ steps.set-matrix.outputs.ksu_resolved_hash }}
      ksu_options_normalized: ${{ steps.set-matrix.outputs.ksu_options_normalized }}
      susfs_base_version: ${{ steps.set-matrix.outputs.susfs_base_version }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_HTTP_TIMEOUT: 600
    steps:
      - name: 📥 Checkout Code (để truy cập configs/)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            configs/
          sparse-checkout-cone-mode: false

      - name: 🔍 Tạo ma trận build
        id: set-matrix
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Tạo ma trận"
          
          input="${{ github.event.inputs.op_model }}"
          ksu_options_raw='${{ github.event.inputs.ksu_options }}'
          if ! ksu_options_normalized=$(echo "$ksu_options_raw" | jq -c 'map(if .type then .type |= ascii_upcase | if .hash == null then if .type == "KSUN" then .hash = "dev" elif .type == "KSU" then .hash = "main" else .hash end else . end else error("No type found") end)' 2>&1); then
            echo "::error::Xác thực ksu_options thất bại: $ksu_options_normalized"
            exit 1
          fi
          
          echo "ksu_options_normalized=$ksu_options_normalized" >> $GITHUB_OUTPUT
          
          echo "[" > matrix.json
          mapfile -t all_json_files < <(find configs/ -name "*.json" -print0 | xargs -0 -n1)
          for i in "${!all_json_files[@]}"; do
            file="${all_json_files[$i]}"
            if [ -f "$file" ]; then
              jq -r '.' "$file" >> matrix.json
              if [ $((i+1)) -lt ${#all_json_files[@]} ]; then
                echo "," >> matrix.json
              fi
            fi
          done
          echo "]" >> matrix.json
          
          jq_filter="."
          
          case "$input" in
            OOS14+15+16)
              ;;
            OOS15+16)
              jq_filter="map(select(.os_version == \"OOS15\" or .os_version == \"OOS16\"))"
              ;;
            OOS14+15)
              jq_filter="map(select(.os_version == \"OOS14\" or .os_version == \"OOS15\"))"
              ;;
            OOS16)
              jq_filter="map(select(.os_version == \"OOS16\"))"
              ;;
            OOS15)
              jq_filter="map(select(.os_version == \"OOS15\"))"
              ;;
            OOS14)
              jq_filter="map(select(.os_version == \"OOS14\"))"
              ;;
            android*-*.*)
              IFS='-' read -r av kv <<< "$input"
              jq_filter="map(select(.os_version == \"OOS15\" or .os_version == \"OOS16\")) | map(select(.android_version == \"$av\" and .kernel_version == \"$kv\"))"
              echo "ℹ️  Đã áp dụng bộ lọc Android-Kernel: $av-$kv"
              echo "   Giới hạn ở: Chỉ OOS15 và OOS16"
              ;;
            *)
              echo "::warning::Đầu vào không xác định '$input'. Đang sử dụng bộ lọc trống."
              jq_filter="map(select(false))"
              ;;
          esac
          
          filtered=$(jq -c "$jq_filter" matrix.json)
          count=$(jq 'length' <<<"$filtered")
          
          filtered=$(echo "$filtered" | jq '
            sort_by(
              (.os_version | gsub("OOS"; "") | tonumber) * -1,
              .model
            )
          ')
          
          if [ "$count" -eq 0 ]; then
            echo "::error::Không tìm thấy file config nào cho đầu vào '$input' sau khi lọc!"
            echo ""
            echo "Các cấu hình khả dụng:"
            jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version))"' matrix.json
            exit 1
          fi
          
          echo "$filtered" | jq '.' > matrix.json
          
          merged_matrix=$(jq -n --argjson devices "$filtered" --argjson ksu_list "$ksu_options_normalized" '[ $devices[] as $dev | $ksu_list[] as $ksu | ($dev + {ksu_type: $ksu.type, ksu_hash: $ksu.hash}) ]')
          final_count=$(echo "$merged_matrix" | jq 'length')
          
          echo "✅ Tìm thấy $final_count thiết bị cần build"
          echo ""
          echo "Các thiết bị đã chọn:"
          jq -r '.[] | "  - \(.model) (\(.os_version), \(.android_version)-\(.kernel_version), \(.ksu_type) - \(.ksu_hash))"' <<<"$merged_matrix"
          
          echo "count=$count" >> "$GITHUB_OUTPUT"
          
          ksu_type=$(echo "$ksu_options_normalized" | jq -r '.[0].type')
          ksu_ref=$(echo "$ksu_options_normalized" | jq -r '.[0].hash')
          
          if [ "$ksu_type" == "KSUN" ]; then
            KSU_REPO_OWNER="KernelSU-Next"
            KSU_REPO_NAME="KernelSU-Next"
          else
            KSU_REPO_OWNER="tiann"
            KSU_REPO_NAME="KernelSU"
          fi
          
          HEAD_REF="refs/heads/${ksu_ref}"
          TAG_REF="refs/tags/${ksu_ref}"
          
          QUERY='query($owner: String!, $name: String!, $headRef: String!, $tagRef: String!, $objRef: String!) {
            repository(owner: $owner, name: $name) {
              hb: ref(qualifiedName: $headRef) { t: target { ... on Commit { o: oid } } }
              ht: ref(qualifiedName: $tagRef) { t: target { ... on Commit { o: oid } } }
              ho: object(expression: $objRef) { ... on Commit { o: oid } }
            }
          }'
          
          MAX_RETRIES=3
          RETRY_COUNT=0
          RETRY_DELAY=5
          
          echo "Đang phân giải mã hash $ksu_type ($ksu_ref)..."
          
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            RESULT=$(gh api graphql -f query="$QUERY" -f owner="$KSU_REPO_OWNER" -f name="$KSU_REPO_NAME" -f headRef="$HEAD_REF" -f tagRef="$TAG_REF" -f objRef="$ksu_ref" 2>/dev/null)
            EXIT_CODE=$?
            
            if [ $EXIT_CODE -eq 0 ] && [ ! -z "$RESULT" ]; then
              echo "  ✅ Gọi API Thành công"
              break
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "::warning::Gọi API thất bại (Lần $RETRY_COUNT/$MAX_RETRIES). Đang thử lại sau ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "::error::Không thể kết nối GitHub API. Không thể xác thực $ksu_ref"
            exit 1
          fi
          
          resolved_sha=$(echo "$RESULT" | jq -r '.data.repository | (.hb.t.o // .ht.t.o // .ho.o // "unknown")')
          
          if [ "$resolved_sha" == "unknown" ]; then
            echo "::error::Ref/Hash '$ksu_ref' không tồn tại trong $KSU_REPO_OWNER/$KSU_REPO_NAME"
            exit 1
          fi
          
          echo "  ✅ Đã phân giải: $ksu_type/$ksu_ref → $resolved_sha"
          echo "ksu_resolved_hash=$resolved_sha" >> "$GITHUB_OUTPUT"
          
          merged_matrix=$(echo "$merged_matrix" | jq  --arg resolved_sha "$resolved_sha" 'map(.ksu_resolved_hash = $resolved_sha)')
          
          SUSFS_REPO="https://gitlab.com/simonpunk/susfs4ksu.git"
          GITLAB_PROJECT_PATH="simonpunk/susfs4ksu"
          
          declare -A default_branches=(
            ["android12-5.10"]="gki-android12-5.10"
            ["android13-5.15"]="gki-android13-5.15"
            ["android14-6.1"]="gki-android14-6.1"
            ["android15-6.6"]="gki-android15-6.6"
            ["android16-6.12"]="gki-android16-6.12"
          )
          
          declare -A user_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )
          
          mapfile -t active_keys < <(
            echo "$merged_matrix" \
              | jq -r '.[] | select(.susfs == true) | "\(.android_version)-\(.kernel_version)"' \
              | sort -u
          )
          
          echo "🔍 Đang phân giải mã hash SUSFS cho: ${active_keys[*]:-none}"
          
          declare -A susfs_hashes
          declare -A susfs_versions_per_key
          
          for key in "${active_keys[@]}"; do
            default_val="${default_branches[$key]}"
            user_val="${user_inputs[$key]:-$default_val}"
            
            HASH_QUERY="{ project(fullPath: \"${GITLAB_PROJECT_PATH}\") { repository { ch: commit(ref: \"${user_val}\") { sha } } } }"
            RELEASE_QUERY="{ project(fullPath: \"${GITLAB_PROJECT_PATH}\") { repository { ch: commit(ref: \"${user_val}\") { sha } blobs(paths: [\"kernel_patches/include/linux/susfs.h\"], ref: \"${user_val}\") { nodes { rawBlob } } } } }"
            
            if [ "${{ inputs.make_release }}" = "true" ]; then
              GL_QUERY="$RELEASE_QUERY"
            else
              GL_QUERY="$HASH_QUERY"
            fi
            
            MAX_RETRIES=3
            RETRY_COUNT=0
            RETRY_DELAY=5
            resolved=""
            
            until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
              RESPONSE=$(curl -s --fail -G "https://gitlab.com/api/graphql" --data-urlencode "query=$GL_QUERY")
              EXIT_CODE=$?
              
              if [ $EXIT_CODE -eq 0 ] && [ -n "$RESPONSE" ]; then
                resolved=$(echo "$RESPONSE" | jq -r '.data.project.repository.ch.sha // empty')
                if [ -n "$resolved" ] && [ "$resolved" != "null" ]; then
                  echo "  ✅ Truy vấn cho $key thành công"
                  
                  if [ "${{ inputs.make_release }}" = "true" ]; then
                    extracted=$(echo "$RESPONSE" | jq -r '.data.project.repository.blobs.nodes[0].rawBlob // empty' | grep '#define SUSFS_VERSION' | awk -F'"' '{print $2}')
                    susfs_versions_per_key[$key]="${extracted:-unknown}"
                    echo "  ✅ $key → SUSFS_VERSION = ${extracted:-unknown}"
                  fi
                  break
                fi
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "::warning::GitLab GraphQL API thất bại (Lần $RETRY_COUNT/$MAX_RETRIES). Đang thử lại..."
              sleep $RETRY_DELAY
            done
            
            if [ -z "$resolved" ] || [ "$resolved" = "null" ]; then
              echo "::error::Không thể phân giải SUSFS ref '$user_val' cho $key trên GitLab."
              exit 1
            fi
            
            if [ "${{ inputs.make_release }}" = "true" ] && [ "${susfs_versions_per_key[$key]:-unknown}" = "unknown" ]; then
              echo "::error::Không thể trích xuất SUSFS_VERSION từ susfs.h cho '$key' sau $MAX_RETRIES lần thử. Không thể tiếp tục tạo release."
              exit 1
            fi
            
            susfs_hashes["$key"]="$resolved"
            echo "  ✅ Đã phân giải: $key → $resolved"
          done
          
          active_gki_keys_csv=$(IFS=','; echo "${active_keys[*]:-}")
          echo "active_gki_keys=$active_gki_keys_csv" >> "$GITHUB_OUTPUT"
          
          echo "susfs_hash_android12_5_10=${susfs_hashes[android12-5.10]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android13_5_15=${susfs_hashes[android13-5.15]:-unknown}" >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android14_6_1=${susfs_hashes[android14-6.1]:-unknown}"   >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android15_6_6=${susfs_hashes[android15-6.6]:-unknown}"   >> "$GITHUB_OUTPUT"
          echo "susfs_hash_android16_6_12=${susfs_hashes[android16-6.12]:-unknown}" >> "$GITHUB_OUTPUT"
          
          if [ "${{ inputs.make_release }}" = "true" ]; then
            susfs_base_version="unknown"
            for key in "${active_keys[@]}"; do
              ver="${susfs_versions_per_key[$key]:-unknown}"
              if [ "$ver" != "unknown" ]; then
                susfs_base_version="$ver"
                break
              fi
            done
            
            if [ "$susfs_base_version" = "unknown" ]; then
              echo "::error::Không thể trích xuất SUSFS_VERSION từ susfs.h cho bất kỳ GKI key nào. Không thể tiếp tục tạo release."
              exit 1
            fi
            
            for key in "${active_keys[@]}"; do
              key_ver="${susfs_versions_per_key[$key]:-unknown}"
              if [ "$key_ver" != "$susfs_base_version" ]; then
                echo "::error::Không khớp phiên bản SUSFS: '$key' có '$key_ver', yêu cầu '$susfs_base_version'. Hãy đồng bộ lại trước khi release."
                exit 1
              fi
            done
            
            echo "susfs_base_version=$susfs_base_version" >> "$GITHUB_OUTPUT"
          fi
          
          susfs_hashes_json=$(jq -n \
            --arg a12 "${susfs_hashes[android12-5.10]:-unknown}" \
            --arg a13 "${susfs_hashes[android13-5.15]:-unknown}" \
            --arg a14 "${susfs_hashes[android14-6.1]:-unknown}" \
            --arg a15 "${susfs_hashes[android15-6.6]:-unknown}" \
            --arg a16 "${susfs_hashes[android16-6.12]:-unknown}" \
            '{
              "android12-5.10": $a12,
              "android13-5.15": $a13,
              "android14-6.1":  $a14,
              "android15-6.6":  $a15,
              "android16-6.12": $a16
            }')
          
          merged_matrix=$(echo "$merged_matrix" | jq \
            --argjson hashes "$susfs_hashes_json" \
            '[.[] | . + {susfs_resolved_hash: ($hashes["\(.android_version)-\(.kernel_version)"] // "unknown")}]')
          
          merged_matrix=$(echo "$merged_matrix" | jq '
            sort_by(
              (.os_version | gsub("OOS"; "") | tonumber? // 0) * -1,
              .model
            )
          ')
          
          wrapped=$(jq -n --argjson items "$merged_matrix" '{ include: $items }')
          echo "matrix=$(jq -c . <<< "$wrapped")" >> "$GITHUB_OUTPUT"
          
          echo "::endgroup::"

      - name: 📤 Tải lên build matrix (Artifact)
        uses: actions/upload-artifact@v7
        with:
          name: build-matrix
          path: matrix.json
          archive: false
          retention-days: 7

      - name: 📊 Bảng tóm tắt kế hoạch Build
        run: |
          ksu_type="${{ fromJSON(steps.set-matrix.outputs.ksu_options_normalized)[0].type }}"
          ksu_ref="${{ fromJSON(steps.set-matrix.outputs.ksu_options_normalized)[0].hash }}"
          
          ksu_display=""
          if [ "$ksu_type" = "KSUN" ] || [ "$ksu_type" = "KSU" ]; then
            if [[ "$ksu_ref" =~ ^[0-9a-f]{40}$ ]]; then
              ksu_display+="📌 \`$ksu_type\`, \`$ksu_ref\`"
            else
              ksu_display+="🔀 \`$ksu_type\`, \`$ksu_ref\` (\`${{ steps.set-matrix.outputs.ksu_resolved_hash }}\`)"
            fi
          fi
          
          build_ts_input="${{ inputs.build_timestamp }}"
          if [ -z "$build_ts_input" ]; then
            build_ts_display="⏱️ tự động (giờ hiện tại)"
          else
            build_ts_display="📌 \`$build_ts_input\`"
          fi
          
          {
            cat << 'EOF'
          ## 🎯 Kế hoạch Build
          
          **Mục tiêu:** ${{ inputs.op_model }}  
          **Số thiết bị:** ${{ steps.set-matrix.outputs.count }}  
          
          **Cấu hình chung:**
          EOF
          
            echo "- Cấu hình KSU: $ksu_display"
            echo "- Thời gian Build: $build_ts_display"
          
            cat << 'EOF'
          - Tối ưu hóa: ${{ inputs.optimize_level }}
          - Build Sạch/Không Ccache: ${{ inputs.clean_build && '✅ Có' || '❌ Không' }}
          - Tạo Release: ${{ inputs.make_release && '✅ Có' || '❌ Không' }}
          - Trích xuất Debug Artifacts: ${{ inputs.debug && '✅ Có' || '❌ Không' }}
          - Đồng bộ toolchains: ${{ inputs.mirror_toolchains && '✅ Có' || '❌ Không' }}
          
          **Cấu hình SUSFS:**
          EOF
          } >> "$GITHUB_STEP_SUMMARY"
          
          declare -A susfs_inputs=(
            ["android12-5.10"]="${{ inputs.android12-5_10_susfs_branch_or_commit }}"
            ["android13-5.15"]="${{ inputs.android13-5_15_susfs_branch_or_commit }}"
            ["android14-6.1"]="${{ inputs.android14-6_1_susfs_branch_or_commit }}"
            ["android15-6.6"]="${{ inputs.android15-6_6_susfs_branch_or_commit }}"
            ["android16-6.12"]="${{ inputs.android16-6_12_susfs_branch_or_commit }}"
          )
          
          declare -A step_hashes=(
            ["android12-5.10"]="${{ steps.set-matrix.outputs.susfs_hash_android12_5_10 }}"
            ["android13-5.15"]="${{ steps.set-matrix.outputs.susfs_hash_android13_5_15 }}"
            ["android14-6.1"]="${{ steps.set-matrix.outputs.susfs_hash_android14_6_1 }}"
            ["android15-6.6"]="${{ steps.set-matrix.outputs.susfs_hash_android15_6_6 }}"
            ["android16-6.12"]="${{ steps.set-matrix.outputs.susfs_hash_android16_6_12 }}"
          )
          
          IFS=',' read -ra active_keys_display \
            <<< "${{ steps.set-matrix.outputs.active_gki_keys }}"
          
          for key in "${active_keys_display[@]}"; do
            value="${susfs_inputs[$key]:-}"
            fetched_hash="${step_hashes[$key]:-unknown}"
            
            if [ -z "$value" ]; then
              echo "- $key: 🔄 tự động (\`$fetched_hash\`)" >> $GITHUB_STEP_SUMMARY
            elif [[ "$value" =~ ^[0-9a-f]{40}$ ]]; then
              echo "- $key: 📌 \`$value\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "- $key: 🔀 \`$value\` (\`$fetched_hash\`)" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **💡 Lưu ý:** Mã Hash được phân giải vào lúc chạy thông qua API trước khi build." >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ inputs.op_model }}" == android*-*.* ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> **⚠️ Bộ lọc Android-Kernel:** Chỉ các thiết bị OOS15 và OOS16 mới được build cho \`${{ inputs.op_model }}\`" >> $GITHUB_STEP_SUMMARY
          fi

  mirror_toolchain:
    needs: set-op-model
    if: ${{ inputs.mirror_toolchains }}
    uses: ./.github/workflows/mirror-toolchains.yml
    secrets: inherit

  build:
    name: build (${{ matrix.model }}, ${{ matrix.soc }}, ${{ matrix.branch }}, ${{ matrix.manifest }}, ${{ matrix.android_version }}, ${{ matrix.kernel_version }}, ${{ matrix.os_version }}, ${{ matrix.ksu_type }})
    needs: [set-op-model, mirror_toolchain]
    if: always() && needs.set-op-model.result == 'success' && (needs.mirror_toolchain.result == 'success' || needs.mirror_toolchain.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-op-model.outputs.matrix) }}
    outputs:
      ksun_ver: ${{ steps.build-stat.outputs.ksu_version }}
      ksu_ver: ${{ steps.build-stat.outputs.ksu_version }}
    steps:
      - name: 🧹 Dọn dẹp ổ đĩa khẩn cấp
        if: ${{ matrix.disk_cleanup }}
        run: |
          echo "::group::Dung lượng đĩa trước khi dọn dẹp"
          df -h
          echo "::endgroup::"
          
          echo "::group::Đang gỡ bỏ các phần mềm không cần thiết"
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          if command -v docker >/dev/null 2>&1; then
            docker rmi $(docker images -q) 2>/dev/null || true
          fi
          echo "::endgroup::"
          
          echo "::group::Dung lượng đĩa sau khi dọn dẹp"
          df -h
          AVAIL=$(df -h / | awk 'NR==2 {print $4}')
          echo "✅ Dung lượng trống: $AVAIL"
          echo "::endgroup::"

      - name: ⬇️ Tải xuống script util_free_space.sh của Apache Arrow
        if: ${{ matrix.disk_cleanup }}
        run: |
          curl -L -o util_free_space.sh https://raw.githubusercontent.com/apache/arrow/main/ci/scripts/util_free_space.sh
          chmod +x util_free_space.sh
          ./util_free_space.sh

      - name: 📥 Checkout Mã nguồn
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 📦 Cài đặt thư viện phụ thuộc tối giản
        run: |
          set -euo pipefail
          echo "::group::Cài đặt thư viện"
          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache jq bc dos2unix kmod libdw-dev elfutils pigz
          sudo apt-get clean
          echo "✅ Cài đặt hoàn tất"
          echo "::endgroup::"

      - name: 💾 Dung lượng ổ đĩa (trước khi build)
        run: |
          echo "::group::Dung lượng ổ đĩa trước khi build"
          df -h /
          du -sh "$GITHUB_WORKSPACE" 2>/dev/null || true
          sudo rm -rf /tmp/* || true
          echo "::endgroup::"

      - name: ♻️ Cấu hình ccache (giới hạn)
        if: ${{ inputs.clean_build != true }}
        run: |
          if command -v ccache >/dev/null 2>&1; then
            echo "::group::Cấu hình ccache"
            ccache -o max_size=1.0G
            ccache -o compression=true
            ccache -o compression_level=3
            ccache -s
            echo "::endgroup::"
          fi

      - name: ⚙️ Chuẩn bị op_config_json (không có trường KSU)
        id: prepare_config
        shell: bash
        run: |
          echo "config_json=$(jq -nc --argjson m '${{ toJSON(matrix) }}' '$m | del(.ksu_type, .ksu_hash, .ksu_resolved_hash)')" >> "$GITHUB_OUTPUT"

      - name: 🔨 Biên dịch Kernel
        id: build
        uses: ./.github/actions/build-kernel
        with:
          op_config_json: ${{ steps.prepare_config.outputs.config_json }}
          ksu_type: ${{ matrix.ksu_type }}
          ksu_branch_or_hash: ${{ matrix.ksu_resolved_hash }}
          susfs_commit_hash_or_branch: ${{ matrix.susfs_resolved_hash }}
          optimize_level: ${{ inputs.optimize_level }}
          build_timestamp: ${{ inputs.build_timestamp }}
          clean: ${{ inputs.clean_build }}
          debug: ${{ inputs.debug }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Thống kê quá trình Build
        id: build-stat
        if: always()
        run: |
          echo "::group::Thống kê quá trình Build"
          
          echo "Thiết bị: ${{ matrix.model }}"
          echo "Phiên bản OS: ${{ matrix.os_version }}"
          echo "Kernel: ${{ matrix.android_version }}-${{ matrix.kernel_version }}"
          if [ "${{ matrix.susfs }}" = true ]; then
            echo "SUSFS Hash: ${{ matrix.susfs_resolved_hash }}"
          fi
          echo "Trạng thái: ${{ job.status }}"
          
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo ""
            echo "✅ Build thành công hoàn toàn"
            echo ""
            echo "Sản phẩm đầu ra:"
            echo "  - Kernel: ${{ steps.build.outputs.kernel_version }}"
            if [ "${{ matrix.ksu_type }}" = "KSUN" ]; then
              echo "  - KSU Next: v${{ steps.build.outputs.ksu_version }}"
              echo "ksun_ver=${{ steps.build.outputs.ksu_version }}" >> "$GITHUB_OUTPUT"
              echo "ksu_ver=" >> "$GITHUB_OUTPUT"
            else
              echo "  - KSU: v${{ steps.build.outputs.ksu_version }}"
              echo "ksun_ver=" >> "$GITHUB_OUTPUT"
              echo "ksu_ver=${{ steps.build.outputs.ksu_version }}" >> "$GITHUB_OUTPUT"
            fi
            if [ "${{ matrix.susfs }}" = true ]; then
              echo "  - SUSFS: ${{ steps.build.outputs.susfs_version }}"
            fi
            echo "  - Thời gian build: ${{ steps.build.outputs.build_time }}s"
            
            if [ "${{ inputs.clean_build }}" != "true" ]; then
              echo "  - Tỷ lệ ccache trúng (hit rate): ${{ steps.build.outputs.ccache_hit_rate }}"
              echo "  - Tỷ lệ ccache trực tiếp (direct rate): ${{ steps.build.outputs.ccache_direct_rate }}"
            else
              echo "  - ccache: đã tắt (clean build)"
            fi
            
            if [ -n "${{ steps.build.outputs.warnings }}" ]; then
              echo "  - Cảnh báo: ${{ steps.build.outputs.warnings }}"
            fi
          else
            echo "❌ Build thất bại"
          fi
          
          echo "::endgroup::"

      - name: 📝 Tóm tắt Job
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          
          ### ${{ matrix.model }} (${{ matrix.os_version }}) - ${{ job.status == 'success' && '✅ Thành công' || '❌ Thất bại' }}
          
          **Kernel:** ${{ matrix.android_version }}-${{ matrix.kernel_version }}
          EOF
          
          if [ "${{ matrix.susfs }}" = true ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          **SUSFS Hash:** \`${{ matrix.susfs_resolved_hash }}\`
          EOF
          fi
          
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF
          | Thông số | Giá trị |
          |--------|-------|
          | **Kernel** | ${{ steps.build.outputs.kernel_version }} |
          EOF
            if [ "${{ matrix.ksu_type }}" = "KSUN" ]; then
              cat >> $GITHUB_STEP_SUMMARY << EOF
          | **KSU Next** | v${{ steps.build.outputs.ksu_version }} |
          EOF
            else
              cat >> $GITHUB_STEP_SUMMARY << EOF
          | **KSU** | v${{ steps.build.outputs.ksu_version }} |
          EOF
            fi
            
            if [ "${{ matrix.susfs }}" = true ]; then
              cat >> $GITHUB_STEP_SUMMARY << EOF
          | **SUSFS** | ${{ steps.build.outputs.susfs_version }} |
          EOF
            fi
          cat >> $GITHUB_STEP_SUMMARY << EOF
          | **Thời gian Build** | ${{ steps.build.outputs.build_time }}s |
          EOF
            
            if [ "${{ inputs.clean_build }}" != "true" ]; then
              cat >> $GITHUB_STEP_SUMMARY << EOF
          | **Tỷ lệ ccache Hit** | ${{ steps.build.outputs.ccache_hit_rate }} |
          | **Tỷ lệ ccache Direct** | ${{ steps.build.outputs.ccache_direct_rate }} |
          EOF
            fi
            
            if [ -n "${{ steps.build.outputs.warnings }}" ]; then
              echo "| **Cảnh báo** | ${{ steps.build.outputs.warnings }} |" >> $GITHUB_STEP_SUMMARY
            fi
            
            cat >> $GITHUB_STEP_SUMMARY << EOF
          
          **Image SHA256:** \`${{ steps.build.outputs.image_sha256 }}\`
          **AnyKernel3 Zip SHA256:** \`${{ steps.build.outputs.zip_sha256 }}\`
          EOF
          fi

      - name: 🧹 Dọn dẹp cuối cùng và báo cáo dung lượng
        if: always()
        run: |
          echo "::group::Dọn dẹp"
          
          sudo rm -rf "$GITHUB_WORKSPACE/out" || true
          sudo rm -rf "$GITHUB_WORKSPACE/build" || true
          sudo rm -rf "$GITHUB_WORKSPACE/kernel/out" || true
          sudo rm -rf "$GITHUB_WORKSPACE/.repo" || true
          sudo rm -rf /tmp/* || true
          
          if command -v ccache >/dev/null 2>&1; then
            echo ""
            echo "📊 Thống kê ccache sau khi build:"
            ccache -s
            echo ""
            echo "💾 ccache đã được giữ lại cho lần build tiếp theo"
          fi
          
          echo ""
          echo "💽 Dung lượng ổ đĩa cuối cùng:"
          df -h /
          
          echo "::endgroup::"

  trigger-release:
    needs: [set-op-model, build]
    runs-on: ubuntu-latest
    if: ${{ inputs.make_release }}
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SUSFS_BASE_VERSION: ${{ needs.set-op-model.outputs.susfs_base_version }}
      RELEASE_NAME: 'OnePlus Kernels Cùng KernelSU & SUSFS ${{ needs.set-op-model.outputs.susfs_base_version }}'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏷️ Tạo và Đẩy Tag mới
        run: |
          LATEST_MATCHING_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags \
            --jq "[.[] | select(.name | startswith(\"${SUSFS_BASE_VERSION}-r\"))] \
                  | sort_by(.name | split(\"-r\")[1] | tonumber) \
                  | last | .name // empty")
          
          if [ -z "$LATEST_MATCHING_TAG" ]; then
            NEW_TAG="${SUSFS_BASE_VERSION}-r1"
          else
            NEW_TAG=$(echo "$LATEST_MATCHING_TAG" | awk -F'-r' '{printf "%s-r%d", $1, $2+1}')
          fi
          
          echo "Tag mới: $NEW_TAG"
          echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
          git tag $NEW_TAG
          git push origin $NEW_TAG

      - name: 📥 Tải xuống Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          merge-multiple: true
          skip-decompress: true

      - name: 📝 Tạo danh sách thiết bị và Release Notes
        id: generate-notes
        run: |
          echo "=== Bắt đầu tạo release notes ==="
          
          declare -A device_info
          
          JSON_BUILD_DATA=$(jq -c '.' ./downloaded-artifacts/matrix.json)
          
          for file in $(find downloaded-artifacts -maxdepth 1 -name "*.zip" -type f | sort); do
            if [ -f "$file" ]; then
              zipname=$(basename "$file" .zip)
              rest="${zipname#AK3_}"
              IFS='_' read -ra parts <<< "$rest"
              model="${parts[0]}"
              os_version="${parts[1]}"
              kernel_version="${parts[2]}"
              ksu_type="${parts[3]}"
              ksu_ver="${parts[4]}"
              if [ "${parts[5]:-}" = "SuSFS" ]; then
                susfs_ver="${parts[6]:-unknown}"
              else
                susfs_ver="none"
              fi
              full_model="${model}_${os_version}"
              device_info["$full_model"]="$model|$os_version|$kernel_version|$ksu_type|$ksu_ver|$susfs_ver"
            fi
          done
          
          ksu_type="${{ fromJSON(needs.set-op-model.outputs.ksu_options_normalized)[0].type }}"
          ksu_ref="${{ fromJSON(needs.set-op-model.outputs.ksu_options_normalized)[0].hash }}"
          ksu_resolved_hash="${{ needs.set-op-model.outputs.ksu_resolved_hash }}"
          
          OPTIMIZE_LEVEL="${{ inputs.optimize_level }}"
          CLEAN_BUILD="${{ inputs.clean_build }}"
          
          declare -A susfs_map=(
            ["android12-5.10"]="${{ needs.set-op-model.outputs.susfs_hash_android12_5_10 }}"
            ["android13-5.15"]="${{ needs.set-op-model.outputs.susfs_hash_android13_5_15 }}"
            ["android14-6.1"]="${{ needs.set-op-model.outputs.susfs_hash_android14_6_1 }}"
            ["android15-6.6"]="${{ needs.set-op-model.outputs.susfs_hash_android15_6_6 }}"
            ["android16-6.12"]="${{ needs.set-op-model.outputs.susfs_hash_android16_6_12 }}"
          )
          
          IFS=',' read -ra active_gki_keys \
            <<< "${{ needs.set-op-model.outputs.active_gki_keys }}"
          
          cat << EOF > release_notes.md
          # 🎯 Kernel OnePlus kèm KernelSU Next & SUSFS $SUSFS_BASE_VERSION
          
          > **Ngày Build:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')  
          > **ID Build:** \`${{ github.run_id }}\`  
          > **Workflow:** [\`${{ github.workflow }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ---
          
          ## 📦 Thiết bị được Build (Tổng cộng ${#device_info[@]})
          
          | Model | Phiên bản OS | Phiên bản Kernel | Tính năng |
          |-------|------------|----------------|----------|
          EOF
          
          for full_key in $(printf '%s\n' "${!device_info[@]}" | sort); do
            IFS='|' read -r model os_ver kernel_ver _ _ _ <<< "${device_info[$full_key]}"
            
            feature_flags=$(jq -r --arg MODEL "$model" '
              .[] | 
              select(.model == $MODEL) |
              "\(.hmbird // false)\t\(.susfs // false)\t\(.bbr // false)\t\(.bbg // false)\t\(.ttl // false)\t\(.ip_set // false)\t\(.unicode // false)\t\(.ds // false)\t\(.ntsync // false)"
            ' <<< "$JSON_BUILD_DATA")
            
            features=()
            if [[ -z "$feature_flags" ]]; then
              echo "Cảnh báo: Không tìm thấy mục JSON cho model: $model" >&2
              features_str="N/A"
            else
              IFS=$'\t' read -r hmbird susfs bbr bbg ttl ip_set unicode ds ntsync <<< "$feature_flags"
              
              [[ "$hmbird" == "true" ]] && features+=("🐦 HMBIRD")
              [[ "$susfs" == "true" ]] && features+=("ඞ SusFS")
              [[ "$bbr" == "true" ]] && features+=("🚀 BBR")
              [[ "$bbg" == "true" ]] && features+=("🛡️ BBG")
              [[ "$ttl" == "true" ]] && features+=("🌐 TTL")
              [[ "$ip_set" == "true" ]] && features+=("🧱 IP_SET & IPv6 NAT")
              [[ "$unicode" == "true" ]] && features+=("🔧 Unicode Fix")
              [[ "$ds" == "true" ]] && features+=("💻 Droidspaces")
              [[ "$ntsync" == "true" ]] && features+=("🔃 NTSync")
              
              total=${#features[@]}
              if [ $total -eq 0 ]; then
                features_str="N/A"
              else
                features_str=""
                count=0
                for item in "${features[@]}"; do
                  count=$((count + 1))
                  features_str+="$item"
                  if [ $count -lt $total ]; then
                    if [ $((count % 3)) -eq 0 ]; then
                      features_str+="<br>"
                    else
                      features_str+="   "
                    fi
                  fi
                done
              fi
            fi
            
            printf "| %-13s | %-10s | %-16s | %-48s |\n" \
              "$model" "$os_ver" "$kernel_ver" "$features_str" >> release_notes.md
          done
          
          if [ ${#device_info[@]} -gt 0 ]; then
            first_entry=$(printf '%s\n' "${!device_info[@]}" | sort | head -n1)
            IFS='|' read -r _ _ _ _ ksu_ver_global _ <<< "${device_info[$first_entry]}"
          else
            echo "::error::Không tìm thấy thông tin thiết bị!" >&2
            exit 1
          fi
          
          cat << EOF >> release_notes.md
          
          ---
          
          ## 🔧 Cấu hình Build
          
          | Thành phần | Phiên bản/Cài đặt |
          |-----------|----------------|
          EOF
          ksu_display_value() {
            local input="$1"
            local resolved="$2"
            if [[ "$input" =~ ^[0-9a-f]{40}$ ]]; then
              echo "$input"
            else
              echo "$input ($resolved)"
            fi
          }
          
          ksu_display=$(ksu_display_value "$ksu_ref" "$ksu_resolved_hash")
          if [ "$ksu_type" == "KSUN" ]; then
            cat << EOF >> release_notes.md
          | **Nhánh KernelSU Next** | \`$ksu_display\` |
          | **Phiên bản KernelSU Next** | \`$ksu_ver_global\` |
          EOF
          elif [ "$ksu_type" == "KSU" ]; then
            cat << EOF >> release_notes.md
          | **Nhánh KernelSU** | \`$ksu_display\` |
          | **Phiên bản KernelSU** | \`$ksu_ver_global\` |
          EOF
          else
            cat << EOF >> release_notes.md
          | **Nhánh KernelSU Fork Chưa rõ** | \`\` |
          | **Phiên bản KernelSU Fork Chưa rõ** | \`\` |
          EOF
          fi
          cat << EOF >> release_notes.md
          | **Phiên bản SUSFS** | \`$SUSFS_BASE_VERSION\` |
          | **Mức độ Tối ưu hóa** | \`$OPTIMIZE_LEVEL\` |
          | **Build Sạch** | $( [ "$CLEAN_BUILD" = "true" ] && echo "✅ Có (không dùng ccache)" || echo "❌ Không (bật ccache)" ) |
          | **Trình biên dịch** | Clang (phiên bản tùy theo thiết bị) |
          
          ### 📌 Ánh xạ Nhánh SUSFS
          
          | Phiên bản Kernel | Commit SUSFS |
          |----------------|--------------|
          $(for key in "${active_gki_keys[@]}"; do
            echo "| $key | \`${susfs_map[$key]:-unknown}\` |"
          done)
          
          ---
          
          ## ✨ Tính năng & Khả năng
          
          ### 🔐 Quản lý Root
          EOF
          if [ "$ksu_type" == "KSUN" ]; then
            cat << EOF >> release_notes.md
          - **KernelSU Next** - Giải pháp root cấp độ kernel thế hệ tiếp theo
          EOF
          elif [ "$ksu_type" == "KSU" ]; then
            cat << EOF >> release_notes.md
          - **KernelSU** - Giải pháp root cấp độ kernel
          EOF
          fi
          cat << EOF >> release_notes.md
          - **SUSFS $SUSFS_BASE_VERSION** - Các tính năng ẩn giấu và bảo mật nâng cao
          EOF
          if [ "$ksu_type" == "KSUN" ] && [ "${ksu_ver_global:-0}" -lt 12884 ]; then
            cat << EOF >> release_notes.md
          - **Hỗ trợ Magic Mount** - Sửa đổi hệ thống tập tin liền mạch
          EOF
          fi
          if [ "${ksu_ver_global:-0}" -lt 12884 ]; then
            cat << EOF >> release_notes.md
          - **Manual Hooks** - scope_min_manual_hooks_v1.4 giúp tương thích tốt hơn
          EOF
          fi
          cat << EOF >> release_notes.md
          ### 🛡️ Bảo mật & Quyền riêng tư
          - **Baseband Guard (BBG)** - Bảo mật baseband dựa trên LSM
          - **Các tính năng Ẩn của SUSFS**:
            - ✅ SUS_PATH - Ẩn các đường dẫn đáng ngờ
            - ✅ SUS_MOUNT - Ẩn các điểm gắn kết (Không hỗ trợ Cli)
            - ✅ SUS_KSTAT - Giả mạo thống kê kernel
            - ✅ SPOOF_UNAME - Giả mạo phiên bản kernel
            - ✅ SPOOF_CMDLINE - Giả mạo tham số khởi động
            - ✅ OPEN_REDIRECT - Chuyển hướng truy cập tập tin
            - ✅ SUS_MAP - Bảo vệ ánh xạ bộ nhớ
            - ✅ AVC_SPOOF - Giả mạo nhật ký từ chối Procfs avc
          - **Ptrace Leak Fix** - Cho các kernel < 5.16
          - **Unicode Fix** - Ngăn chặn duyệt đường dẫn bằng cách sử dụng codepoint Unicode không in được [Thử nghiệm]
          
          ### 🚀 Hiệu suất & Mạng
          - **BBRv1** - Cải thiện kiểm soát tắc nghẽn TCP
          - **Wireguard** - Hỗ trợ VPN tích hợp sẵn
          - **Hỗ trợ IP Set & IPv6 NAT** - Khả năng tường lửa nâng cao và hỗ trợ IPv6 NAT
          - **Hỗ trợ TTL Target** - Thao tác gói tin mạng
          - **LTO (Link Time Optimization)** - Tối ưu hóa kích thước và hiệu suất nhị phân
          - **Build tăng tốc bằng ccache** - Thời gian biên dịch nhanh hơn
          - **Các bản vá Tối ưu hóa** - Bộ nhớ, I/O, bộ lập lịch CPU, mạng và các tinh chỉnh chung khác
          
          ### 🔧 Tính năng Hệ thống
          - **TMPFS_XATTR** - Thuộc tính mở rộng cho tmpfs (Hỗ trợ Mountify)
          - **TMPFS_POSIX_ACL** - POSIX ACL cho tmpfs
          - **HMBIRD SCX** - Phần mở rộng bộ lập lịch cho thiết bị SM8750/MT6991
          - **Droidspaces** - Hỗ trợ các bộ chứa Linux di động.
          - **NTSync** - Nguyên hàm đồng bộ hóa độ trễ thấp
          
          ---
          
          ## 📱 Ứng dụng Manager
          
          ### Manager Chính thức
          EOF
          if [ "$ksu_type" == "KSUN" ]; then
            cat << EOF >> release_notes.md
          - **KernelSU Next Manager** → [GitHub Release](https://github.com/KernelSU-Next/KernelSU-Next/releases)
          EOF
          elif [ "$ksu_type" == "KSU" ]; then
            cat << EOF >> release_notes.md
          - **KernelSU Manager** → [GitHub Release](https://github.com/tiann/KernelSU/releases)
          EOF
          fi
          cat << EOF >> release_notes.md
          ### Manager Cộng đồng
          - **WildKSU Manager** (Khuyên dùng để có thêm tính năng) → [GitHub Release](https://github.com/WildKernels/Wild_KSU/releases)
          
          ### Module Bắt buộc
          - **KSU SUSFS Module** (Bắt buộc cho các tính năng của SUSFS) → [GitHub Release](https://github.com/sidex15/ksu_module_susfs/releases)
          
          ### Công cụ Flash Khuyên dùng
          - **Kernel Flasher** (Bắt buộc để flash zip AnyKernel3 và OTA) → [GitHub Release](https://github.com/fatalcoder524/KernelFlasher/releases)
          
          ---
          
          ## 📜 Nhật ký Thay đổi (Changelog)
          
          ### Bản Release này
          - Cập nhật SUSFS lên $SUSFS_BASE_VERSION.
          - Thêm hỗ trợ HMBIRD cho tất cả các thiết bị SM8750/MT6991.
          - Cải thiện hệ thống build ccache.
          - Nâng cao khả năng ẩn giấu của SUSFS.
          - Thêm hỗ trợ IP_SET, IPv6 NAT và TTL.
          - Thêm hỗ trợ TMPFS_XATTR và TMPFS_POSIX_ACL cho Mountify.
          - Thêm bản vá Ptrace leak cho các kernel < 5.16.
          - Tối ưu hóa trình biên dịch (${{ inputs.optimize_level }}).
          - Bản vá vượt qua Unicode.
          - Hỗ trợ Droidspaces và NTSync.
          
          ### Các bản Release trước
          Xem tại [Trang Releases](${{ github.server_url }}/${{ github.repository }}/releases)
          
          ---
          
          ## 🙏 Lời cảm ơn (Credits)
          
          - **Đội ngũ KernelSU Next & KernelSU** - Giải pháp Root
          - **simonpunk** - Phát triển SUSFS
          - **OnePlus** - Mã nguồn Kernel
          - **Những người đóng góp trong Cộng đồng** - Thử nghiệm và phản hồi
          
          **⚡ Được xây dựng với ❤️ bởi cộng đồng**
          EOF
          
          echo "--- Release Notes Cuối cùng ---"
          cat release_notes.md

      - name: 🚀 Tạo GitHub Release
        run: |
          gh release create "${{ env.NEW_TAG }}" \
            --repo "${{ env.REPO_OWNER }}/${{ env.REPO_NAME }}" \
            --title "${{ env.RELEASE_NAME }}" \
            --notes-file release_notes.md \
            --draft

      - name: 📤 Upload Release Assets Tự động
        run: |
          for file in ./downloaded-artifacts/*.zip; do
            if [ -f "$file" ]; then
              echo "Đang upload $file..."
              gh release upload "${{ env.NEW_TAG }}" "$file" --clobber
            fi
          done

      - name: 📊 Tổng kết Release
        if: success()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          
          ---
          
          ## 🎉 Tạo Release Thành công
          
          **Tag:** [\`${{ env.NEW_TAG }}\`](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ env.NEW_TAG }})  
          **Số lượng Kernel:** $(find ./downloaded-artifacts -maxdepth 1 -name "*.zip" -type f | wc -l)
          
          ### 📦 File đính kèm (Assets)
          EOF
          
          for zip in ./downloaded-artifacts/*.zip; do
            if [ -f "$zip" ]; then
              name=$(basename "$zip")
              size=$(stat -c%s "$zip")
              size_mb=$(echo "scale=2; $size / 1024 / 1024" | bc)
              echo "- \`$name\` (${size_mb} MB)" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: ⚙️ Trích xuất tính năng cho Telegram
        run: |
          echo "Đang trích xuất các tính năng từ matrix.json..."
          JSON_FILE="./downloaded-artifacts/matrix.json"
          
          hmbird=$(jq -r '[.[].hmbird // false] | any' "$JSON_FILE")
          susfs=$(jq -r '[.[].susfs // false] | any' "$JSON_FILE")
          bbr=$(jq -r '[.[].bbr // false] | any' "$JSON_FILE")
          bbg=$(jq -r '[.[].bbg // false] | any' "$JSON_FILE")
          ttl=$(jq -r '[.[].ttl // false] | any' "$JSON_FILE")
          ip_set=$(jq -r '[.[].ip_set // false] | any' "$JSON_FILE")
          unicode=$(jq -r '[.[].unicode // false] | any' "$JSON_FILE")
          ds=$(jq -r '[.[].ds // false] | any' "$JSON_FILE")
          ntsync=$(jq -r '[.[].ntsync // false] | any' "$JSON_FILE")
          
          features=()
          [[ "$hmbird" == "true" ]] && features+=("🐦 HMBIRD")
          [[ "$susfs" == "true" ]] && features+=("ඞ SusFS")
          [[ "$bbr" == "true" ]] && features+=("🚀 BBR")
          [[ "$bbg" == "true" ]] && features+=("🛡️ BBG")
          [[ "$ttl" == "true" ]] && features+=("🌐 TTL")
          [[ "$ip_set" == "true" ]] && features+=("🧱 IP_SET & IPv6 NAT")
          [[ "$unicode" == "true" ]] && features+=("🔧 Unicode Fix")
          [[ "$ds" == "true" ]] && features+=("💻 Droidspaces")
          [[ "$ntsync" == "true" ]] && features+=("🔃 NTSync")
          
          TG_FEATURES=$(printf "%s\n" "${features[@]}")
          if [ -z "$TG_FEATURES" ]; then
            TG_FEATURES="Không có tính năng đặc biệt"
          fi
          
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "TG_FEATURES<<$EOF" >> $GITHUB_ENV
          echo "$TG_FEATURES" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: 📢 Gửi thông báo Telegram (Kênh)
        env:
          TG_BOT_TK: ${{ secrets.TG_BOT_TK }}
          CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          set -euo pipefail
          
          TEXT=$(cat <<EOF
          <b>🚀 New OnePlus Kernel Release! 🚀</b>
          
          🌿 Branch: <code>${{ github.ref_name }}</code>
          🏷️ Tag: <code>${NEW_TAG}</code>
          📦 SUSFS Version: <code>${SUSFS_BASE_VERSION}</code>
          
          ✨ Features: 
          <pre>${TG_FEATURES}</pre>
          
          📥 Download: <a href="${{ github.server_url }}/${{ github.repository }}/releases/tag/${NEW_TAG}">Click Here</a>
          EOF
          )

          curl -s "https://api.telegram.org/bot${TG_BOT_TK}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode text="${TEXT}"

